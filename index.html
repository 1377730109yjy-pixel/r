<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{

  overflow:hidden;
  height:100%;width:100%;

}

  position:fixed;inset:0;z-index:0;pointer-events:none;

}

#particles{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ===== SCENE CONTAINER ===== */
#stage{

}

.scene{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;

}
.scene.active{opacity:1;pointer-events:auto;}

.hero{
  font-weight:400;
  font-size:clamp(3.6rem,10vw,8rem);
  letter-spacing:.1em;
  line-height:1.2;

}

  font-size:clamp(6rem,16vw,12rem);
  color:var(--gold);
  letter-spacing:.03em;
  line-height:1;

.big-quote{
  font-size:clamp(2rem,5vw,3rem);
  font-style:italic;
  line-height:1.7;
  color:var(--gold-light);
  font-weight:400;
  text-shadow:0 2px 24px rgba(0,0,0,.5);
}
.body{
  font-size:clamp(1.8rem,3.8vw,2.4rem);
  line-height:1.8;
  color:var(--dim);
  font-weight:400;
  letter-spacing:.02em;
  text-shadow:0 2px 16px rgba(0,0,0,.5);
}
.body em,.body strong{color:var(--text);font-style:normal;font-weight:700;}
.small{
  font-size:clamp(1.4rem,2.8vw,1.8rem);
  color:var(--faint);
  letter-spacing:.08em;
  font-weight:400;
  text-shadow:0 1px 12px rgba(0,0,0,.45);
}

/* ===== LAYOUT HELPERS ===== */
.tc{text-align:center;align-items:center;}
.narrow{max-width:clamp(420px,75vw,720px);}

.line{
  width:40px;height:1px;background:var(--gold);opacity:.5;
  margin:16px 0;
}

/* ===== TYPEWRITER CURSOR ===== */
.cursor::after{
  content:'|';color:var(--gold);
  animation:blink .8s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* ===== TAP HINT ===== */
.tap-hint{
  font-size:2rem;color:var(--faint);letter-spacing:.1em;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}

/* ===== HANDWRITING FONT ===== */
.handwrite{
  font-family:"KaiTi","STKaiti","LXGW WenKai","Noto Serif SC",serif;
  letter-spacing:.06em;
}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .scene{padding:clamp(40px,8vw,100px);}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* =================================================================
   PARTICLE SYSTEM
   ================================================================= */
(function(){
  const c=document.getElementById('particles');
  const ctx=c.getContext('2d');
  let ps=[];
  function resize(){
    const dpr=Math.min(devicePixelRatio||1,2);
    c.width=innerWidth*dpr;c.height=innerHeight*dpr;
    c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';
    ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
  }
  function create(){
    ps=[];
    const n=innerWidth<480?30:50;
    for(let i=0;i<n;i++)ps.push({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      r:Math.random()*2.2+.4,sy:Math.random()*.25+.06,  // rise upward like bubbles
      sx:(Math.random()-.5)*.08,o:Math.random()*.22+.03,
      clr:Math.random()>.6?'200,225,245':(Math.random()>.5?'170,210,235':'185,220,245'),
      wb:Math.random()*Math.PI*2,ws:(Math.random()-.5)*.004
    });
  }
  function anim(){
    ctx.clearRect(0,0,innerWidth,innerHeight);
    for(const p of ps){
      p.y-=p.sy;p.x+=p.sx+Math.sin(p.wb)*.15;p.wb+=p.ws;
      if(p.y<-10){p.y=innerHeight+10;p.x=Math.random()*innerWidth;}
      if(p.x<-10)p.x=innerWidth+10;
      if(p.x>innerWidth+10)p.x=-10;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.clr},${p.o})`;ctx.fill();
    }
    requestAnimationFrame(anim);
  }
  resize();create();anim();
  addEventListener('resize',()=>{resize();create();});
})();

/* =================================================================
   SCENE ENGINE + TYPEWRITER
   ================================================================= */
const stage=document.getElementById('stage');
let currentScene=-1;
let charIndex=0;
let sceneChars=[];
let typingTimer=null;
let typingSpeed=38;
let isTyping=false;
let sceneDone=false;

function buildSceneEl(scene,i){
  const el=document.createElement('div');
  el.className='scene '+(scene.cls||'tc');
  el.dataset.index=i;
  el.innerHTML=scene.html;
  // collect all text nodes
  sceneChars[i]=[];
  function walk(node){
    if(node.nodeType===3){
      const text=node.textContent;
      node.textContent='';
      for(let j=0;j<text.length;j++){
        sceneChars[i].push({parent:node,char:text[j],pos:j});
      }
    }else{
      for(let c=node.firstChild;c;c=c.nextSibling)walk(c);
    }
  }
  walk(el);
  return el;
}

const sceneEls=SCENES.map((s,i)=>buildSceneEl(s,i));
sceneEls.forEach(el=>stage.appendChild(el));

function showScene(i){
  if(i<0||i>=SCENES.length)return;
  // hide all
  sceneEls.forEach(el=>el.classList.remove('active'));
  // show current
  sceneEls[i].classList.add('active');
  currentScene=i;
  charIndex=0;
  sceneDone=false;
  // reset text
  const chars=sceneChars[i]||[];
  chars.forEach(c=>c.parent.textContent='');
  // start typing
  typeNextChar();
}

function typeNextChar(){
  if(currentScene<0)return;
  const chars=sceneChars[currentScene]||[];
  if(charIndex>=chars.length){
    sceneDone=true;
    isTyping=false;
    // show tap hint if exists
    const hint=sceneEls[currentScene].querySelector('.tap-hint');
    if(hint)hint.style.opacity='1';
    return;
  }
  isTyping=true;
  const c=chars[charIndex];
  c.parent.textContent+=c.char;
  charIndex++;
  const ch=c.char;
  let delay=typingSpeed;
  if('，。；：！？…—'.includes(ch))delay=typingSpeed*1.8;
  else if('、\n'.includes(ch))delay=typingSpeed*1.4;
  typingTimer=setTimeout(typeNextChar,delay+Math.random()*12);
}

function skipTyping(){
  if(currentScene<0)return;
  if(isTyping){
    clearTimeout(typingTimer);
    const chars=sceneChars[currentScene]||[];
    // reveal all remaining chars
    while(charIndex<chars.length){
      chars[charIndex].parent.textContent+=chars[charIndex].char;
      charIndex++;
    }
    isTyping=false;
    sceneDone=true;
    const hint=sceneEls[currentScene].querySelector('.tap-hint');
    if(hint)hint.style.opacity='1';
  }
}

function nextScene(){
  if(currentScene<0){showScene(0);return;}
  if(isTyping){skipTyping();return;}
  if(currentScene>=SCENES.length-1){showScene(0);return;}
  showScene(currentScene+1);
}

// click/tap anywhere
document.addEventListener('click',(e)=>{
  e.preventDefault();
  nextScene();
});

// keyboard
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'||e.key===' '){
    e.preventDefault();nextScene();
  }else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){
    e.preventDefault();
    if(currentScene>0)showScene(currentScene-1);
  }
});

// wheel: down=next, up=prev
let wheelLock=false;
document.addEventListener('wheel',(e)=>{
  e.preventDefault();
  if(wheelLock)return;
  wheelLock=true;
  if(e.deltaY>20)nextScene();
  else if(e.deltaY<-20&&currentScene>0)showScene(currentScene-1);
  setTimeout(()=>{wheelLock=false;},400);
},{passive:false});

// touch
let tsY=0;
document.addEventListener('touchstart',(e)=>{tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',(e)=>{
  const dy=tsY-e.changedTouches[0].clientY;
  if(Math.abs(dy)<10)nextScene();
  else if(dy>30)nextScene();
  else if(dy<-30&&currentScene>0)showScene(currentScene-1);
});

// init
showScene(0);
</script>
